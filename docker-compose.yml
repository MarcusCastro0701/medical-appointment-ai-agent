services:
  postgres:
    image: postgres:16-alpine
    container_name: medical-appointment-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: medical_appointment
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d medical_appointment']
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: medical-appointment-app
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/medical_appointment
    ports:
      - '3000:3000'

volumes:
  postgres_data:
